<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>

  <!-- title banner -->
  <rect x="20" y="16" width="1160" height="46" rx="8" fill="#0f172a"/>
  <text x="600" y="39" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="bold">Hub (ratholehub / hub.py) — one panel drives many servers over SSH</text>
  <text x="600" y="55" text-anchor="middle" fill="#cbd5e1" font-size="12.5">stdlib-only Python · binds 127.0.0.1, fronted by nginx /hub/ · never runs raw strings on servers</text>

  <!-- ADMIN -->
  <rect x="40" y="300" width="150" height="110" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="115" y="332" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">Admin</text>
  <text x="115" y="354" text-anchor="middle" font-size="11" fill="#1e40af">browser UI</text>
  <text x="115" y="372" text-anchor="middle" font-size="11" fill="#1e40af">Bearer token +</text>
  <text x="115" y="388" text-anchor="middle" font-size="11" fill="#1e40af">rhsession cookie</text>

  <!-- HUB SERVER zone -->
  <rect x="250" y="90" width="470" height="590" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="485" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#3730a3">Hub server</text>

  <!-- nginx /hub/ -->
  <rect x="280" y="132" width="410" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="485" y="158" text-anchor="middle" font-size="13" font-weight="bold" fill="#075985">nginx  →  location /hub/  →  127.0.0.1:8088</text>
  <text x="485" y="178" text-anchor="middle" font-size="11" fill="#0c4a6e">TLS + public entry; hub itself is loopback-only</text>

  <!-- Handler / router -->
  <rect x="280" y="210" width="410" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="485" y="236" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">Handler (router) · ThreadingHTTPServer</text>
  <text x="485" y="256" text-anchor="middle" font-size="11" fill="#4c1d95">auth: hmac session · login rate-limit (X-Real-IP)</text>
  <text x="485" y="272" text-anchor="middle" font-size="11" fill="#4c1d95">inventory.json / config.json (atomic, locked)</text>

  <!-- validation / build_cmd -->
  <rect x="280" y="300" width="410" height="118" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="485" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">build_iran_cmd / build_node_cmd</text>
  <text x="485" y="348" text-anchor="middle" font-size="11" fill="#78350f">action + args  →  validated argv list</text>
  <text x="485" y="366" text-anchor="middle" font-size="11" fill="#78350f">every arg checked by RE_* (RE_NAME, RE_PORT,…)</text>
  <text x="485" y="384" text-anchor="middle" font-size="11" fill="#78350f">action must be in the allow-list</text>
  <text x="485" y="402" text-anchor="middle" font-size="10.5" fill="#b91c1c">NO string interpolation into a shell</text>

  <!-- ssh transport -->
  <rect x="280" y="436" width="410" height="86" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="485" y="462" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">run_on_server → _ssh_base</text>
  <text x="485" y="482" text-anchor="middle" font-size="11" fill="#475569">ssh -i key … host -- &lt;argv&gt;  (each arg separate)</text>
  <text x="485" y="500" text-anchor="middle" font-size="11" fill="#475569">provision_server (sshpass→key) · deploy_to_server (scp+update.sh)</text>

  <!-- ssh key -->
  <rect x="280" y="540" width="410" height="120" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="485" y="566" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#14532d">SSH identity (ssh_key_path)</text>
  <text x="485" y="586" text-anchor="middle" font-size="11" fill="#166534">ed25519 keypair generated by the hub</text>
  <text x="485" y="604" text-anchor="middle" font-size="11" fill="#166534">public key installed into each server's authorized_keys</text>
  <text x="485" y="624" text-anchor="middle" font-size="11" fill="#166534">key-based auth after first provision</text>

  <!-- MANAGED SERVERS zone -->
  <rect x="770" y="90" width="410" height="590" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="975" y="116" text-anchor="middle" font-size="15" font-weight="bold" fill="#475569">Managed fleet (inventory.json)</text>

  <rect x="800" y="140" width="350" height="96" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="975" y="166" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Iran server #1 (role: iran)</text>
  <text x="975" y="186" text-anchor="middle" font-size="11" fill="#78350f">runs ratholectl (server + nginx)</text>
  <text x="975" y="204" text-anchor="middle" font-size="11" fill="#78350f">add/rm node · kcp · noise · game · domains</text>
  <text x="975" y="222" text-anchor="middle" font-size="10.5" fill="#78350f">hub sends: ["ratholectl","add",name,…]</text>

  <rect x="800" y="252" width="350" height="70" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="975" y="278" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#92400e">Iran server #2 … N</text>
  <text x="975" y="298" text-anchor="middle" font-size="11" fill="#78350f">each fronts its own domain / 443</text>

  <rect x="800" y="342" width="350" height="96" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="975" y="368" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Foreign node #1 (role: node)</text>
  <text x="975" y="388" text-anchor="middle" font-size="11" fill="#166534">runs ratholenode (rathole client)</text>
  <text x="975" y="406" text-anchor="middle" font-size="11" fill="#166534">add-svc · upstream · kcp · watchdog</text>
  <text x="975" y="424" text-anchor="middle" font-size="10.5" fill="#166534">hub sends: ["ratholenode","add-svc",…]</text>

  <rect x="800" y="454" width="350" height="70" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="975" y="480" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#065f46">Foreign node #2 … M</text>
  <text x="975" y="500" text-anchor="middle" font-size="11" fill="#166534">no agent installed — plain SSH only</text>

  <text x="975" y="560" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#475569">Panel ↔ node mgmt also flows</text>
  <text x="975" y="578" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#475569">over the tunnel via &lt;name&gt;_api</text>

  <!-- arrows -->
  <line x1="190" y1="355" x2="276" y2="162" stroke="#334155" stroke-width="2.2" marker-end="url(#a)"/>
  <text x="205" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">HTTPS /hub/</text>

  <line x1="694" y1="479" x2="796" y2="188" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#ab)"/>
  <line x1="694" y1="479" x2="796" y2="390" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#ab)"/>
  <text x="742" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">SSH (argv)</text>

  <!-- legend -->
  <text x="40" y="716" font-size="11.5" fill="#475569">Legend:</text>
  <line x1="100" y1="712" x2="140" y2="712" stroke="#334155" stroke-width="2.2" marker-end="url(#a)"/>
  <text x="148" y="716" font-size="11.5" fill="#475569">admin → hub (HTTPS)</text>
  <line x1="300" y1="712" x2="340" y2="712" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#ab)"/>
  <text x="348" y="716" font-size="11.5" fill="#475569">hub → server (SSH, one validated argv per action)</text>
  <text x="760" y="716" font-size="11.5" fill="#64748b">Adding an action = add it to build_*_cmd + the allow-list + a regex.</text>
</svg>
