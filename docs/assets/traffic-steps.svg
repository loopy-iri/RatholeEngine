<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1220" height="430" fill="#ffffff"/>
  <rect x="20" y="14" width="1180" height="40" rx="8" fill="#0f172a"/>
  <text x="610" y="40" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">Packet Journey — User to Open Internet</text>

  <!-- step 0: reverse tunnel setup -->
  <text x="610" y="78" text-anchor="middle" font-size="12.5" fill="#7c3aed" font-weight="bold">Step 0: each node opens a persistent reverse tunnel to Iran over wss/443 (root + Upgrade) → rathole control :2333</text>

  <!-- boxes -->
  <g>
    <rect x="20"   y="150" width="160" height="84" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="100"  y="184" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">User</text>
    <text x="100"  y="206" text-anchor="middle" font-size="11" fill="#1e40af">Xray client</text>
    <text x="100"  y="222" text-anchor="middle" font-size="11" fill="#1e40af">VLESS+WS /trk01</text>

    <rect x="240"  y="150" width="160" height="84" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="320"  y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#075985">Nginx :443</text>
    <text x="320"  y="200" text-anchor="middle" font-size="11" fill="#0c4a6e">TLS termination</text>
    <text x="320"  y="216" text-anchor="middle" font-size="11" fill="#0c4a6e">map $uri → :1001</text>

    <rect x="460"  y="150" width="160" height="84" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="540"  y="184" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#5b21b6">rathole server</text>
    <text x="540"  y="206" text-anchor="middle" font-size="11" fill="#4c1d95">data :1001 (Iran)</text>

    <rect x="680"  y="150" width="160" height="84" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="760"  y="184" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#14532d">rathole client</text>
    <text x="760"  y="206" text-anchor="middle" font-size="11" fill="#166534">on node (abroad)</text>

    <rect x="900"  y="150" width="160" height="84" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="980"  y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#14532d">Xray (node)</text>
    <text x="980"  y="200" text-anchor="middle" font-size="11" fill="#166534">ws inbound :2087</text>
    <text x="980"  y="216" text-anchor="middle" font-size="11" fill="#166534">opens VLESS</text>

    <rect x="1090" y="150" width="110" height="84" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="1145" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Open</text>
    <text x="1145" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Internet</text>
  </g>

  <!-- arrows -->
  <line x1="180" y1="192" x2="238" y2="192" stroke="#334155" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="209" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">1</text>
  <text x="209" y="184" text-anchor="middle" font-size="9.5" fill="#334155">TLS/443</text>

  <line x1="400" y1="192" x2="458" y2="192" stroke="#334155" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="429" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">2</text>

  <line x1="620" y1="192" x2="678" y2="192" stroke="#9333ea" stroke-width="2.6" stroke-dasharray="7 5" marker-end="url(#ap)"/>
  <text x="649" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">3</text>
  <text x="649" y="184" text-anchor="middle" font-size="9.5" fill="#7c3aed">tunnel</text>

  <line x1="840" y1="192" x2="898" y2="192" stroke="#334155" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="869" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">4</text>
  <text x="869" y="184" text-anchor="middle" font-size="9.5" fill="#334155">:2087</text>

  <line x1="1060" y1="192" x2="1088" y2="192" stroke="#334155" stroke-width="2.4" marker-end="url(#a)"/>
  <text x="1074" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">5</text>

  <!-- return note -->
  <text x="610" y="268" text-anchor="middle" font-size="12" fill="#475569">Response travels the same path in reverse (6→10): Internet → Xray → tunnel → rathole → Nginx → User</text>

  <!-- encapsulation legend -->
  <rect x="260" y="300" width="700" height="100" rx="10" fill="#fafafa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="610" y="324" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">Encapsulation between User and Iran server</text>
  <rect x="290" y="336" width="640" height="46" rx="6" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="345" y="333" font-size="10.5" fill="#075985"> </text>
  <rect x="320" y="346" width="580" height="30" rx="5" fill="#ede9fe" stroke="#7c3aed"/>
  <rect x="350" y="352" width="520" height="18" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="305" y="357" font-size="10.5" fill="#075985">TLS</text>
  <text x="333" y="364" font-size="10.5" fill="#5b21b6">WS</text>
  <text x="610" y="364" text-anchor="middle" font-size="10.5" fill="#14532d">VLESS  ⊃  user traffic (opened only by Xray on the node)</text>

  <text x="610" y="416" text-anchor="middle" font-size="11" fill="#64748b">Nginx and rathole never decrypt VLESS — only the node's Xray does.</text>
</svg>
